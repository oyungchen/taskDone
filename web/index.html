<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Task Manager</h1>
            <div class="filter-controls">
                <label>
                    From:
                    <input type="date" id="filter-start">
                </label>
                <label>
                    To:
                    <input type="date" id="filter-end">
                </label>
                <button id="clear-filter" class="btn-secondary">Clear</button>
            </div>
        </header>

        <main class="kanban-board">
            <section class="column" data-status="pending">
                <h2>Pending</h2>
                <div class="tasks-container" data-status="pending"></div>
            </section>
            <section class="column" data-status="processing">
                <h2>Processing</h2>
                <div class="tasks-container" data-status="processing"></div>
            </section>
            <section class="column" data-status="done">
                <h2>Done</h2>
                <div class="tasks-container" data-status="done"></div>
            </section>
        </main>

        <button id="add-task-btn" class="btn-primary">+ Add Task</button>
    </div>

    <!-- Add Task Modal -->
    <div id="add-task-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Add New Task</h2>
            <form id="add-task-form">
                <div class="form-group">
                    <label for="task-name">Task Name</label>
                    <input type="text" id="task-name" required>
                </div>
                <div class="form-group">
                    <label for="task-description">Description</label>
                    <textarea id="task-description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="task-deadline">Deadline</label>
                    <input type="date" id="task-deadline">
                </div>
                <div class="form-group">
                    <label for="task-priority">Priority</label>
                    <select id="task-priority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancel-add" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Add Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Task Detail Modal -->
    <div id="task-detail-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Task Details</h2>
            <div id="task-detail-content"></div>
            <div class="form-actions">
                <button id="edit-task-btn" class="btn-primary">Edit</button>
                <button id="delete-task-btn" class="btn-danger">Delete</button>
                <button id="close-detail" class="btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div id="edit-task-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Edit Task</h2>
            <form id="edit-task-form">
                <div class="form-group">
                    <label for="edit-task-name">Task Name</label>
                    <input type="text" id="edit-task-name" required>
                </div>
                <div class="form-group">
                    <label for="edit-task-description">Description</label>
                    <textarea id="edit-task-description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="edit-task-deadline">Deadline</label>
                    <input type="date" id="edit-task-deadline">
                </div>
                <div class="form-group">
                    <label for="edit-task-priority">Priority</label>
                    <select id="edit-task-priority">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancel-edit" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- No Tasks Message -->
    <div id="no-tasks-message" class="hidden">
        <p>No tasks in selected date range</p>
    </div>

    <!-- Warning Banner -->
    <div id="warning-banner" class="hidden">
        <p>Warning: localStorage is not available. Your tasks will not be saved.</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
